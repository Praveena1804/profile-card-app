<!DOCTYPE html>
<html>
<head>
    <title>Profile Card Generator</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
        }

        h1 {
            margin-top: 20px;
        }

        form {
            margin: 20px;
        }

        input, textarea {
            padding: 10px;
            margin: 10px;
            width: 250px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px 20px;
            background: #333;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .card {
            margin: 20px auto;
            padding: 20px;
            width: 300px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
        }
    </style>
</head>
<body>

<h1>User Profile Card Generator</h1>

<form method="POST">
    <input type="text" name="name" placeholder="Enter Name" required><br>
    <textarea name="bio" placeholder="Enter Bio" required></textarea><br>
    <input type="text" name="image" placeholder="Enter Image URL" required><br>
    <button type="submit">Generate</button>
</form>

{% if name %}
<div class="card">
    <img src="{{ image }}" alt="Profile Image"><br><br>
    <h2>{{ name }}</h2>
    <p>{{ bio }}</p>
</div>
{% endif %}

</body>
</html>
