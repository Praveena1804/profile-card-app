<!DOCTYPE html>
<html>
<head>
    <title>User Profile Card Generator</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            text-align: center;
        }

        h1 {
            color: white;
            margin-top: 30px;
        }

        .container {
            width: 350px;
            margin: 30px auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 95%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .card {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border-radius: 15px;
            background: #f8f9ff;
        }

        .card img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #667eea;
        }
    </style>
</head>

<body>

<h1>User Profile Card Generator</h1>

<div class="container">

    <!-- No Flask POST -->
    <input type="text" id="name" placeholder="Enter Name" required>
    <input type="text" id="bio" placeholder="Enter Bio" required>
    <input type="text" id="image" placeholder="Enter Image URL" required>

    <button onclick="generateCard()">Generate Profile</button>

    <div class="card" id="card">
        <img id="img">
        <h2 id="cardName"></h2>
        <p id="cardBio"></p>
    </div>

</div>

<script>
function generateCard() {
    let name = document.getElementById("name").value;
    let bio = document.getElementById("bio").value;
    let image = document.getElementById("image").value;

    document.getElementById("cardName").innerText = name;
    document.getElementById("cardBio").innerText = bio;
    document.getElementById("img").src = image;

    document.getElementById("card").style.display = "block";
}
</script>

</body>
</html>
