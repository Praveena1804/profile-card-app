<!DOCTYPE html>
<html>
<head>
    <title>User Profile Card Generator</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            margin: 0;
        }

        h1 {
            color: white;
            margin-top: 30px;
        }

        .container {
            background: white;
            width: 320px;
            margin: 30px auto;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 95%;
            padding: 10px;
            background: #4facfe;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .card {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border-radius: 12px;
            background: #f9f9f9;
        }

        .card img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
        }
    </style>
</head>

<body>

<h1>User Profile Card Generator</h1>

<div class="container">

    <!-- No Flask POST now -->
    <input type="text" id="name" placeholder="Enter Name">
    <input type="text" id="bio" placeholder="Enter Bio">
    <input type="text" id="image" placeholder="Enter Image URL">

    <button onclick="generateCard()">Generate</button>

    <div class="card" id="card">
        <img id="img">
        <h2 id="cardName"></h2>
        <p id="cardBio"></p>
    </div>

</div>

<script>
function generateCard() {
    let name = document.getElementById("name").value;
    let bio = document.getElementById("bio").value;
    let image = document.getElementById("image").value;

    document.getElementById("cardName").innerText = name;
    document.getElementById("cardBio").innerText = bio;
    document.getElementById("img").src = image;

    document.getElementById("card").style.display = "block";
}
</script>

</body>
</html>
