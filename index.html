<!DOCTYPE html>
<html>
<head>
    <title>User Profile Card Generator</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f4f4f4;
        }

        h1 {
            margin-top: 20px;
        }

        input {
            margin: 8px;
            padding: 10px;
            width: 250px;
        }

        button {
            padding: 10px 20px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        .card {
            width: 300px;
            margin: 20px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
            display: none;
        }

        img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
        }
    </style>

</head>

<body>

<h1>User Profile Card Generator</h1>

<input type="text" id="name" placeholder="Enter Name"><br>
<input type="text" id="bio" placeholder="Enter Bio"><br>
<input type="text" id="image" placeholder="Enter Image URL"><br>

<button onclick="generateCard()">Generate</button>

<div class="card" id="profileCard">
    <img id="profileImg" src="">
    <h2 id="profileName"></h2>
    <p id="profileBio"></p>
</div>

<script>
function generateCard() {
    let name = document.getElementById("name").value;
    let bio = document.getElementById("bio").value;
    let image = document.getElementById("image").value;

    document.getElementById("profileName").innerText = name;
    document.getElementById("profileBio").innerText = bio;
    document.getElementById("profileImg").src = image;

    document.getElementById("profileCard").style.display = "block";
}
</script>

</body>
</html>
