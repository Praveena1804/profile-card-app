<!DOCTYPE html>
<html>
<head>
    <title>User Profile Card Generator</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h1 {
            color: white;
            margin-top: 30px;
        }

        .container {
            background: white;
            width: 320px;
            margin: 30px auto;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        button {
            width: 95%;
            padding: 10px;
            background: #4facfe;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #007bff;
        }

        .card {
            margin-top: 20px;
            padding: 20px;
            border-radius: 12px;
            background: #f9f9f9;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .card img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #4facfe;
        }

        .card h2 {
            margin: 10px 0 5px;
        }

        .card p {
            color: #555;
        }
    </style>
</head>

<body>

<h1>User Profile Card Generator</h1>

<div class="container">
    <form method="POST" action="/">
        <input type="text" name="name" placeholder="Enter Name" required>
        <input type="text" name="bio" placeholder="Enter Bio" required>
        <input type="text" name="image" placeholder="Enter Image URL" required>

        <button type="submit">Generate</button>
    </form>

    {% if name %}
    <div class="card">
        <img src="{{ image }}" alt="Profile Image">
        <h2>{{ name }}</h2>
        <p>{{ bio }}</p>
    </div>
    {% endif %}
</div>

</body>
</html>
